<footer class="mt-16 bg-stone-900 text-stone-300">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

      {{/* Contact */}}
      <div>
        <h3 class="text-white font-semibold mb-3">Kontakt</h3>
        <address class="not-italic text-sm space-y-1">
          {{ with .Site.Params.ownerEmail }}
          <p>
            <a href="mailto:{{ . }}" class="hover:text-white transition-colors">{{ . }}</a>
          </p>
          {{ end }}
          {{ with .Site.Params.city }}
          <p>{{ . }}</p>
          {{ end }}
        </address>
      </div>

      {{/* Navigation */}}
      <div>
        <h3 class="text-white font-semibold mb-3">Navigation</h3>
        <ul class="text-sm space-y-1">
          {{ range .Site.Menus.main }}
          <li><a href="{{ .URL }}" class="hover:text-white transition-colors">{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </div>

    </div>

    <div class="mt-8 pt-6 border-t border-stone-700 text-sm text-stone-500 text-center">
      &copy; {{ now.Year }} {{ .Site.Params.ownerName }}
    </div>
  </div>
</footer>
