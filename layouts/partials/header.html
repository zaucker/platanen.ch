<header class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-stone-100 shadow-sm">
  <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8" aria-label="Hauptnavigation">
    <div class="flex items-center justify-between h-16">

      {{/* Logo / Site name */}}
      <a href="{{ .Site.Home.RelPermalink }}" class="flex items-center gap-2 font-semibold text-stone-900 hover:text-platane transition-colors">
        <span class="text-2xl">{{ .Site.Title }}</span>
      </a>

      {{/* Desktop navigation */}}
      <div class="hidden md:flex items-center gap-1">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}"
           class="px-3 py-2 rounded-md text-sm font-medium transition-colors
                  {{ if $.IsMenuCurrent "main" . }}text-platane bg-platane-light{{ else }}text-stone-700 hover:text-platane hover:bg-stone-50{{ end }}">
          {{ .Name }}
        </a>
        {{ end }}
      </div>

      {{/* Mobile menu toggle */}}
      <button id="mobile-menu-btn" class="md:hidden p-2 rounded-md text-stone-600 hover:text-platane"
              aria-expanded="false" aria-controls="mobile-menu">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>

    {{/* Mobile menu */}}
    <div id="mobile-menu" class="hidden md:hidden pb-3 border-t border-stone-100">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"
         class="block px-3 py-2 text-sm font-medium text-stone-700 hover:text-platane hover:bg-stone-50 rounded-md">
        {{ .Name }}
      </a>
      {{ end }}
    </div>

  </nav>
</header>
